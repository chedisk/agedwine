<!--年齡框開始-->
<font color="#FF0000"><b>
<script language="JavaScript">
var today = new Date();
var year = today.getFullYear();
var month = today.getMonth();
var day = today.getDate();
var t_yy = 0;
var t_mm = 0;
var t_dd = 0;

var b_yy = 1971;
var b_mm = 12;
var b_dd = 1;

t_yy = year - b_yy - 1;

if ( month + 1 > b_mm)
{ t_mm = month - b_mm ;
t_yy++;
}
else
t_mm = 12 - b_mm + month;

if (day > b_dd)
{ t_dd = day - b_dd;
t_mm++;
}
else
t_dd = daysInMonth(month, year) - b_dd + day;

if (t_dd > daysInMonth(month, year)-1)
{ t_dd = 0;
t_mm++;
}

if (t_mm > 11)
{ t_mm = 0;
t_yy++;
}

document.write("金隆年齡："); 

if (t_yy > 0)
document.write(" " + t_yy + " 歲 ");

if (t_mm > 0)
document.write(t_mm + " 個月");

if (t_dd > 0)
document.write(" 又 " + t_dd + " 天") ;


//****** function set ******

function arrayOfDayInMonths(isLeapYear) 
{ 
this[0] = 31; 
this[1] = 31; 
this[2] = 28; 
if (isLeapYear) 
this[2] = 29; 
this[3] = 31; 
this[4] = 30; 
this[5] = 31; 
this[6] = 30; 
this[7] = 31; 
this[8] = 31; 
this[9] = 30; 
this[10] = 31; 
this[11] = 30; 
}

function daysInMonth(month, year)
{ var isLeapYear = ((( year % 4 == 0) && (year % 100 != 0)) || (year % 400 

== 0));
var monthdays = new arrayOfDayInMonths(isLeapYear);
return monthdays[month];
}
</script>
</b></font>
<!--琦哥年齡框結束-->
